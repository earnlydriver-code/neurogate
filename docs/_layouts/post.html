---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d·%m·%Y" }}</time></p>

  {{ content }}

  <p class="post-back"><a href="{{ '/' | relative_url }}">← Volver al inicio</a></p>
</article>
