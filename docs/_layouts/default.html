<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">🧠🛡️ {{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Inicio</a>
      <a href="{{ site.repo_url }}">Código</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>NeuroGate es un prototipo educativo en simulación — no es un dispositivo
    médico. Señal sintética o de datasets públicos; sin datos de pacientes.</p>
  </footer>
</body>
</html>
